name: Build and Unit Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    env:
      UNIT_TEST_PROJECT: tests/TripleG3.P2P.UnitTests/TripleG3.P2P.UnitTests.csproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore $env:UNIT_TEST_PROJECT

      - name: Build (Release)
        run: dotnet build $env:UNIT_TEST_PROJECT -c Release -warnaserror --no-restore

      - name: Unit Test (Release)
        run: dotnet test $env:UNIT_TEST_PROJECT -c Release --no-build --no-restore --logger "trx;LogFilePrefix=unit" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: TestResults/*.trx