name: Build and Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TripleG3.P2P.slnx

      - name: Build (Release)
        run: dotnet build TripleG3.P2P.slnx -c Release -warnaserror --no-restore

      - name: Test (Release)
        run: dotnet test TripleG3.P2P.slnx -c Release --no-build --no-restore --logger "trx;LogFilePrefix=ci" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx